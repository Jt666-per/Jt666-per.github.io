<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逐梦桃花源的暖窝 · 主页</title>
    <!-- 公共样式 & 字体图标 (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="logo.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #fef9f1;  /* 暖白基底 */
            color: #4a3b2f;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        /* 顶部导航 */
        .header {
            background: #fff4e6;
            box-shadow: 0 4px 12px rgba(251, 181, 138, 0.2);
            padding: 0.6rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 2px solid #fadbc7;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-area img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            background: #fff0e0;
            border: 2px solid #f8b281;
        }
        .site-name {
            font-size: 1.7rem;
            font-weight: 500;
            color: #bf7b54;
            letter-spacing: 1.5px;
            text-shadow: 2px 2px 0 #fae1d2;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            font-size: 1.15rem;
            font-weight: 500;
            flex-wrap: wrap;
        }
        .nav-links a {
            text-decoration: none;
            color: #946b51;
            padding: 0.3rem 0.2rem;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
        }
        .nav-links a:hover {
            border-bottom-color: #e3a082;
            color: #b45f3a;
        }
        /* 主内容容器 */
        .main-content {
            flex: 1;
            max-width: 1200px;
            width: 90%;
            margin: 2rem auto;
            background: rgba(255, 247, 240, 0.7);
            border-radius: 32px;
            padding: 2rem 2.5rem;
            box-shadow: 0 10px 30px #f0daca;
        }
        /* 底部 */
        .footer {
            background: #ead7cb;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.95rem;
            color: #5e4a3c;
            border-top: 3px solid #dbb59b;
        }
        .stats span {
            background: #fff2e6;
            padding: 4px 12px;
            border-radius: 30px;
            margin-right: 15px;
            box-shadow: inset 0 1px 3px #b38e78;
        }
        .admin-area a {
            background: #bb7e5f;
            color: white;
            padding: 5px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            margin-left: 10px;
            border: 1px solid #a76f53;
        }
        .admin-area a:hover {
            background: #9f6447;
        }
        .admin-area span {
            margin-left: 15px;
        }
        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow: 0 8px 18px #edd9cb;
            border: 1px solid #f7cfb8;
        }
        h2 {
            color: #a5673f;
            margin-bottom: 1rem;
            border-left: 6px solid #f1ab86;
            padding-left: 1rem;
        }
        button, .btn {
            background: #f5c1a0;
            border: none;
            padding: 8px 22px;
            border-radius: 36px;
            color: #3e2e23;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #e3a27d;
            transition: 0.15s;
        }
        button:hover, .btn:hover {
            background: #ec9e72;
            color: white;
        }
        /* 模拟缩略图/图片网格 */
        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .photo-item, .diary-item {
            background: #f8ede2;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 5px 12px #e2cbb9;
            transition: transform 0.15s;
        }
        .photo-item:hover, .diary-item:hover {
            transform: scale(1.01);
        }
        .photo-item img, .diary-item img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border-bottom: 3px solid #f3c7a9;
        }
        .photo-item .info, .diary-item .info {
            padding: 12px 15px;
        }
        /* 幻灯片模态框（轻量） */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal-content {
            max-width: 80%;
            max-height: 80%;
            background: #1e1e1e;
            border-radius: 24px;
            padding: 10px;
            position: relative;
        }
        .modal img {
            width: 100%;
            height: auto;
            max-height: 70vh;
            border-radius: 18px;
        }
        .close-btn {
            position: absolute;
            top: 10px; right: 20px;
            font-size: 2.5rem;
            color: white;
            cursor: pointer;
        }
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,240,0.5);
            border: none;
            font-size: 3rem;
            padding: 0 20px;
            cursor: pointer;
            color: #3e2e23;
            border-radius: 40px;
        }
        .prev { left: 10px; }
        .next { right: 10px; }
        /* 标签样式 */
        .tag {
            display: inline-block;
            background: #f2d5c2;
            color: #674b38;
            border-radius: 36px;
            padding: 4px 16px;
            margin: 6px 6px 0 0;
            font-size: 0.9rem;
        }
        /* 下载列表 */
        .file-item {
            background: #fffaf4;
            border-radius: 50px;
            padding: 12px 25px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 25px;
            border: 1px solid #f2cbb3;
        }
        .file-item i {
            font-size: 2rem;
            color: #bd7a56;
        }
        /* 登录表单 */
        .login-box {
            max-width: 400px;
            margin: 3rem auto;
            background: white;
            border-radius: 48px;
            padding: 2.5rem;
        }
    </style>
</head>
<body>
    <!-- 公共头部 -->
    <header class="header">
        <div class="logo-area">
            <img src="logo.ico" alt="小窝logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/42?text=🏠'">
            <span class="site-name">逐梦桃花源的暖窝</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">首页</a>
            <a href="diary.html">个人日志</a>
            <a href="download.html">下载中心</a>
            <a href="photo.html">相册</a>
            <a href="myself.html">个人介绍</a>
        </nav>
    </header>

    <!-- 主内容区 (各页面不同)  index.html -->
    <div class="main-content">
        <div class="card" style="background: linear-gradient(145deg, #fff7f0, #fee9db);">
            <h2><i class="fa-solid fa-leaf" style="color: #c9825b;"></i> 暖窝 · 最新动态</h2>
            <p style="font-size:1.2rem; margin-bottom: 1.5rem;">欢迎来到我的小天地！这里是温暖与梦境的起点～</p>
            <div style="display: flex; gap: 2rem; flex-wrap: wrap;">
                <div style="flex:1; min-width:200px; background: #ffefe4; border-radius: 32px; padding: 1.5rem;">
                    <i class="fa-solid fa-pen" style="color:#b97551;"></i> 最近日志<br>
                    <small>「地铁上的书香」刚刚更新</small>
                </div>
                <div style="flex:1; min-width:200px; background: #ffefe4; border-radius: 32px; padding: 1.5rem;">
                    <i class="fa-solid fa-image" style="color:#b97551;"></i> 最新相册<br>
                    <small>「春日桃花隧道」3张新片</small>
                </div>
            </div>
            <!-- 简单占位欢迎语 -->
            <div style="margin-top: 2rem; text-align: center; color:#7b5b48;">✨ 愿你在这里找到片刻宁静 ✨</div>
        </div>
    </div>

    <!-- 公共底部 -->
    <footer class="footer">
        <div class="stats">
            <span><i class="fa-regular fa-eye"></i> 今日 1,247</span>
            <span><i class="fa-regular fa-clock"></i> 历史 58,362</span>
        </div>
        <div class="admin-area" id="dynamicAdminLink">
            <!-- 动态加载: 登录/后台 链接 -->
            <a href="login.html" id="loginOutLink">管理员登录</a>
            <span id="adminDashboardLink" style="display: none;">
                <a href="admin.html">后台管理</a>
                <a href="#" id="logoutBtn">注销</a>
            </span>
        </div>
    </footer>

    <!-- 公共脚本：模拟登录状态 & 底部浏览量微动 -->
    <script>
        (function() {
            // 浏览统计模拟 (每个页面独立刷新稍微增加)
            let todaySpan = document.querySelector('.stats span:first-child');
            let totalSpan = document.querySelector('.stats span:last-child');
            if (todaySpan && totalSpan) {
                let today = parseInt(localStorage.getItem('mock_today') || '1247');
                let total = parseInt(localStorage.getItem('mock_total') || '58362');
                // 简单增加一点 (每个页面视为一次浏览)
                today += 1;
                total += 1;
                localStorage.setItem('mock_today', today);
                localStorage.setItem('mock_total', total);
                todaySpan.innerHTML = '<i class="fa-regular fa-eye"></i> 今日 ' + today;
                totalSpan.innerHTML = '<i class="fa-regular fa-clock"></i> 历史 ' + total;
            }

            // 登录状态管理 (sessionStorage)
            function updateAdminLink() {
                const isLogged = sessionStorage.getItem('diaryAdmin') === 'true';
                const loginLink = document.getElementById('loginOutLink');
                const adminSpan = document.getElementById('adminDashboardLink');
                if (isLogged) {
                    loginLink.style.display = 'none';
                    adminSpan.style.display = 'inline';
                } else {
                    loginLink.style.display = 'inline';
                    adminSpan.style.display = 'none';
                }
            }

            // 注销
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    sessionStorage.removeItem('diaryAdmin');
                    updateAdminLink();
                    window.location.href = 'main.html';
                });
            }

            updateAdminLink();
        })();
    </script>
</body>
</html>
