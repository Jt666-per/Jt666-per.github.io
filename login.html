<div class="main-content" style="max-width:500px;">
    <div class="login-box card">
        <h2 style="text-align:center;">管理员登录</h2>
        <form id="loginForm">
            <div style="margin: 1.5rem 0;"><i class="fa-regular fa-user"></i> 用户名 <input type="text" id="username" value="admin" style="width:100%; padding:12px; border-radius:50px; border:1px solid #e3a27d;"></div>
            <div style="margin: 1.5rem 0;"><i class="fa-regular fa-lock"></i> 密码 <input type="password" id="password" value="87654321" style="width:100%; padding:12px; border-radius:50px; border:1px solid #e3a27d;"></div>
            <button type="submit" style="width:100%; padding:14px; font-size:1.2rem;">登 录</button>
        </form>
        <p style="margin-top:1rem;">提示: 账号 admin / 密码 87654321</p>
    </div>
</div>
<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value.trim();
        const pwd = document.getElementById('password').value.trim();
        if(user === 'admin' && pwd === '87654321') {
            sessionStorage.setItem('diaryAdmin', 'true');
            window.location.href = 'admin.html';
        } else {
            alert('用户名或密码错误');
        }
    });
</script>
