<div class="main-content">
    <h2><i class="fa-regular fa-images"></i> 光影相册 (imagine 文件夹)</h2>
    <div class="grid-list" id="galleryGrid">
        <!-- 图片由 js 动态生成便于幻灯片，也可静态写死，但为了统一事件，用 js 生成示例 -->
    </div>
</div>
<!-- 简单幻灯片模态框 -->
<div id="photoModal" class="modal">
    <span class="close-btn" id="closeModal">&times;</span>
    <button class="prev" id="prevBtn">&#10094;</button>
    <button class="next" id="nextBtn">&#10095;</button>
    <div class="modal-content"><img id="modalImage" src="" alt=""></div>
</div>
<script>
    (function() {
        // 模拟 imagine 目录下图片 (使用在线占位图)
        const images = [
            'https://picsum.photos/id/1018/800/600',
            'https://picsum.photos/id/1015/800/600',
            'https://picsum.photos/id/1020/800/600',
            'https://picsum.photos/id/1025/800/600',
            'https://picsum.photos/id/1043/800/600',
            'https://picsum.photos/id/1044/800/600'
        ];
        const grid = document.getElementById('galleryGrid');
        if (grid) {
            images.forEach((src, index) => {
                const item = document.createElement('div');
                item.className = 'photo-item';
                item.innerHTML = `<img src="${src}" alt="相册图" data-index="${index}"><div class="info">📷 imagine/img${index+1}.jpg</div>`;
                item.querySelector('img').addEventListener('click', function() {
                    openModal(index);
                });
                grid.appendChild(item);
            });
        }

        // 幻灯片逻辑
        const modal = document.getElementById('photoModal');
        const modalImg = document.getElementById('modalImage');
        const closeBtn = document.getElementById('closeModal');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        let currentIndex = 0;

        function openModal(index) {
            currentIndex = index;
            modalImg.src = images[currentIndex];
            modal.style.display = 'flex';
        }

        closeBtn.onclick = function() { modal.style.display = 'none'; };
        prevBtn.onclick = function() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            modalImg.src = images[currentIndex];
        };
        nextBtn.onclick = function() {
            currentIndex = (currentIndex + 1) % images.length;
            modalImg.src = images[currentIndex];
        };
        window.onclick = function(e) { if (e.target === modal) modal.style.display = 'none'; };
    })();
</script>
